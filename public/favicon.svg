<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- background -->
  <rect width="32" height="32" rx="4" fill="#0a0a0a"/>
  <!-- skull dome -->
  <ellipse cx="16" cy="13" rx="10" ry="9" fill="#8b0000"/>
  <!-- eye sockets -->
  <circle cx="12" cy="12" r="3" fill="#0a0a0a"/>
  <circle cx="20" cy="12" r="3" fill="#0a0a0a"/>
  <!-- nose -->
  <ellipse cx="16" cy="17" rx="1.5" ry="1.5" fill="#0a0a0a"/>
  <!-- jaw -->
  <rect x="9" y="20" width="14" height="6" rx="2" fill="#8b0000"/>
  <!-- teeth gaps -->
  <rect x="11" y="21" width="2" height="4" rx="0.5" fill="#0a0a0a"/>
  <rect x="15" y="21" width="2" height="4" rx="0.5" fill="#0a0a0a"/>
  <rect x="19" y="21" width="2" height="4" rx="0.5" fill="#0a0a0a"/>
  <!-- blood drip -->
  <rect x="15" y="26" width="2" height="4" rx="1" fill="#8b0000"/>
  <ellipse cx="16" cy="31" rx="2.5" ry="1.5" fill="#8b0000"/>
</svg>
